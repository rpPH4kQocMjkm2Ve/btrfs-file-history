name: CI

on:
  push:
    paths:
      - 'btrfs_file_history/**'
      - 'tests/**'
      - 'pyproject.toml'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'btrfs_file_history/**'
      - 'tests/**'
      - 'pyproject.toml'
      - '.github/workflows/ci.yml'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: pip install --no-cache-dir ruff mypy
      - run: ruff check btrfs_file_history/
      - run: mypy --ignore-missing-imports btrfs_file_history/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: pip install --no-cache-dir pytest
      - run: python -m pytest tests/ -v
